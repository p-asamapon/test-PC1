<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Factory | Time-Series Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --highlight: #10b981;
            --text: #f8fafc;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Prompt', sans-serif;
            margin: 0; padding: 20px;
        }
        .filter-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; color: #94a3b8; }
        select {
            background: #0f172a;
            color: white;
            border: 1px solid var(--accent);
            padding: 10px;
            border-radius: 8px;
            outline: none;
        }
        .main-chart {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; font-weight: 400; font-size: 1.2rem; color: var(--accent); }
    </style>
</head>
<body>

<div class="filter-bar">
    <div class="input-group">
        <label>1. เลือกเครื่องจักร</label>
        <select id="mcFilter" onchange="updateDashboard()"></select>
    </div>
    <div class="input-group">
        <label>2. เลือกวันที่ (ปี/เดือน/วัน)</label>
        <select id="dateFilter" onchange="updateDashboard()"></select>
    </div>
</div>

<div class="main-chart">
    <h2 id="chartTitle">แนวโน้มข้อมูลเครื่องจักร</h2>
    <canvas id="timeChart" style="max-height: 450px;"></canvas>
    <p style="color: #94a3b8; font-size: 0.8rem; margin-top: 15px;">* กราฟจะแสดงค่าอุณหภูมิแยกตามช่วงเวลาที่บันทึกจริงในระบบ</p>
</div>

<script>
    const csvUrl = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTjMi9ReUUyW0kg97lGWA1cmrw6FeFxrAdbr6XUg1YZ3_BdDHEi9fcFvuqmohXmuVwXW_jEsvFvGv-g/pub?output=csv`;
    let rawData = [];
    let chartInstance = null;

    async function init() {
        const res = await fetch(csvUrl);
        const text = await res.text();
        Papa.parse(text, {
            header: true,
            dynamicTyping: true,
            complete: (results) => {
                // กรองข้อมูลและแปลงวันที่
                rawData = results.data.filter(d => d['ชื่อเครื่องจักร']).map(d => {
                    const dt = new Date(d['วันที่และเวลาเปิดเครื่อง']);
                    return {
                        ...d,
                        dateStr: dt.toLocaleDateString('th-TH'),
                        timeStr: dt.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit', second:'2-digit'}),
                        machine: d['ชื่อเครื่องจักร'].split('_')[0]
                    };
                });
                
                populateFilters();
                updateDashboard();
            }
        });
    }

    function populateFilters() {
        const mcSelect = document.getElementById('mcFilter');
        const dateSelect = document.getElementById('dateFilter');

        const machines = [...new Set(rawData.map(d => d.machine))].sort();
        const dates = [...new Set(rawData.map(d => d.dateStr))].sort();

        machines.forEach(m => mcSelect.add(new Option(`เครื่องจักร ${m}`, m)));
        dates.forEach(d => dateSelect.add(new Option(d, d)));
    }

    function updateDashboard() {
        const selectedMC = document.getElementById('mcFilter').value;
        const selectedDate = document.getElementById('dateFilter').value;

        // กรองข้อมูลตามที่เลือก
        const filtered = rawData.filter(d => d.machine === selectedMC && d.dateStr === selectedDate);
        
        // แยกข้อมูลอุณหภูมิ Zone 1/1 เป็นตัวอย่าง (หรือจะรวมทุก Zone ก็ได้)
        const tempData = filtered.filter(d => d['ชื่อเครื่องจักร'].includes('Temp_Zone1/1'));
        const labels = tempData.map(d => d.timeStr);
        const values = tempData.map(d => d['อุณหภูมิ']);

        document.getElementById('chartTitle').innerText = `Machine ${selectedMC} | ข้อมูลวันที่ ${selectedDate}`;

        if(chartInstance) chartInstance.destroy();

        const ctx = document.getElementById('timeChart').getContext('2d');
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'อุณหภูมิ Zone 1/1 (°C)',
                    data: values,
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointHoverRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#f8fafc', font: { family: 'Prompt' } } }
                },
                scales: {
                    y: { 
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#94a3b8' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#94a3b8' }
                    }
                }
            }
        });
    }

    init();
</script>

</body>
</html>
